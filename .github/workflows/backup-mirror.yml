name: Mirror to Backup Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pat:
        description: "GitHub PAT with repo scope (for one-time manual trigger only)"
        required: false
        default: ""

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to nuswalab_backup
        run: |
          # Use input PAT if provided (manual trigger), otherwise use stored secret
          TOKEN="${{ github.event.inputs.pat }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${{ secrets.BACKUP_REPO_TOKEN }}"
          fi
          git remote add backup "https://x-access-token:${TOKEN}@github.com/rikoconstantine10-ops/nuswalab_backup.git"
          git push backup main --force
