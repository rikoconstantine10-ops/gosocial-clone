<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edurep Article Generator</title>
<style>
:root {
  --bg:#F4F6FA;--surface:#FFF;--surface2:#F0F2F7;--surface3:#E5E8F0;
  --border:#DDE1EC;--border2:#C8CEDF;
  --text:#1A1D2E;--text2:#4A5068;--text3:#8891AA;
  --accent:#4F46E5;--accent2:#6D64F0;--accent-dim:rgba(79,70,229,.10);
  --green:#16A34A;--green-dim:rgba(22,163,74,.10);
  --yellow:#B45309;--yellow-dim:rgba(180,83,9,.10);
  --red:#DC2626;--red-dim:rgba(220,38,38,.10);
  --orange:#C2410C;--orange-dim:rgba(194,65,12,.10);
  --blue:#1D4ED8;--blue-dim:rgba(29,78,216,.10);
  --purple:#7C3AED;--purple-dim:rgba(124,58,237,.10);
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.6}
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:224px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent) 0%,#7C3AED 100%);display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:13px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.sidebar-nav{padding:10px 8px;flex:1}
.nav-section{margin-bottom:18px}
.nav-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 10px;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:13px;transition:background .12s,color .12s;user-select:none;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;background:var(--accent-dim);color:var(--accent);padding:1px 7px;border-radius:10px;flex-shrink:0}
.nav-badge.red{background:var(--red-dim);color:var(--red)}
.nav-badge.green{background:var(--green-dim);color:var(--green)}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);flex-shrink:0}
.api-status{display:flex;align-items:center;gap:6px;margin-top:4px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.status-dot.ok{background:var(--green)}
.status-dot.err{background:var(--red)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:13px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--surface);flex-shrink:0;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:600;flex:1;color:var(--text)}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;white-space:nowrap;font-family:inherit;line-height:1}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(79,70,229,.25)}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface);color:var(--text2);border-color:var(--border2);box-shadow:var(--sh)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:var(--green-dim);color:var(--green)}
.btn-success:hover{background:var(--green);color:#fff}
.btn-warning{background:var(--yellow-dim);color:var(--yellow)}
.btn-warning:hover{background:var(--yellow);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .12s;box-shadow:var(--sh)}
.stat-card:hover{border-color:var(--accent);box-shadow:var(--sh-md);transform:translateY(-1px)}
.stat-value{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-queued{background:var(--surface3);color:var(--text2)}
.badge-generating{background:var(--blue-dim);color:var(--blue)}
.badge-draft{background:var(--yellow-dim);color:var(--yellow)}
.badge-scheduled{background:var(--orange-dim);color:var(--orange)}
.badge-published{background:var(--green-dim);color:var(--green)}
.badge-rejected{background:var(--red-dim);color:var(--red)}
.badge-error{background:var(--red-dim);color:var(--red)}

/* ── Table ── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:9px 14px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}
.td-title{max-width:260px}
.td-title-text{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);display:block}
.td-sub{color:var(--text3);font-size:11px;display:block}
.td-actions{display:flex;gap:4px;white-space:nowrap}

/* ── Forms ── */
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
input,textarea,select{width:100%;padding:8px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .12s,box-shadow .12s;box-shadow:var(--sh)}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
textarea{resize:vertical;min-height:100px}
input[type=checkbox]{width:auto}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(15,15,30,.4);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.filter-bar input{max-width:200px;flex:1;min-width:120px}
.filter-bar select{width:auto;min-width:130px}

/* ── Empty state ── */
.empty{text-align:center;padding:56px 24px;color:var(--text3)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:14px;margin-bottom:4px;color:var(--text2)}

/* ── QC Score ── */
.qc-score{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.qc-high{color:var(--green)}.qc-mid{color:var(--yellow)}.qc-low{color:var(--red)}

/* ── KB / Guideline textarea ── */
.kb-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Fira Code','JetBrains Mono',monospace;font-size:12px;line-height:1.65;padding:14px;resize:vertical;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
.kb-textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-dim)}

/* ── Uni grid ── */
.uni-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.uni-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);transition:all .12s;cursor:pointer}
.uni-card:hover{border-color:var(--accent);box-shadow:var(--sh-md);transform:translateY(-1px)}
.uni-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uni-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.uni-card-footer{margin-top:8px;display:flex;justify-content:space-between;align-items:center}

/* ── Calendar ── */
.calendar-header{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.calendar-month{font-size:15px;font-weight:600}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:11px;color:var(--text3);text-transform:uppercase;padding:5px 0}
.cal-day{min-height:72px;background:var(--surface);border-radius:var(--rs);padding:5px;border:1px solid var(--border)}
.cal-day.other-month{opacity:.4}
.cal-day.today{border-color:var(--accent);background:var(--accent-dim)}
.cal-date{font-size:11px;color:var(--text3);margin-bottom:3px}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.draft{background:var(--yellow-dim);color:var(--yellow)}
.cal-event.published{background:var(--green-dim);color:var(--green)}
.cal-event.error{background:var(--red-dim);color:var(--red)}
.cal-event.queued{background:var(--surface3);color:var(--text2)}
.cal-event.generating{background:var(--blue-dim);color:var(--blue)}

/* ── Log ── */
.log-entry{padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.log-time{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.log-level{font-size:10px;font-weight:700;text-transform:uppercase;width:40px;flex-shrink:0}
.log-level.info{color:var(--blue)}.log-level.warn{color:var(--yellow)}.log-level.error{color:var(--red)}
.log-msg{font-size:12px;color:var(--text2);word-break:break-all}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:var(--rs);font-size:13px;display:none;max-width:320px;box-shadow:var(--sh-md)}
#toast.show{display:block;animation:slideUp .18s ease}
#toast.toast-ok{border-left:3px solid var(--green)}
#toast.toast-err{border-left:3px solid var(--red)}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Batch rows ── */
.batch-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.batch-row input{flex:1}
.add-more{display:flex;align-items:center;gap:5px;color:var(--accent);cursor:pointer;font-size:13px;margin-top:4px}
.add-more:hover{color:var(--accent2)}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:6px 16px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text3);cursor:pointer;font-weight:400;font-family:inherit;transition:color .12s}
.tab-btn.active{border-bottom-color:var(--accent);color:var(--accent);font-weight:600}

/* ── SEO ── */
.seo-scan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.seo-scan-info{flex:1;min-width:180px}
.seo-scan-title{font-size:13px;font-weight:600;margin-bottom:3px}
.seo-scan-meta{font-size:11px;color:var(--text3)}
.seo-result-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.chip-ok{background:var(--green-dim);color:var(--green)}
.chip-warn{background:var(--yellow-dim);color:var(--yellow)}
.chip-err{background:var(--red-dim);color:var(--red)}
.chip-gray{background:var(--surface3);color:var(--text2)}

/* ── GSC ── */
.gsc-stat{text-align:center;padding:12px}
.gsc-stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.gsc-stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── Data section ── */
.data-section{background:var(--surface2);border-radius:var(--rs);padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.data-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.data-item{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;gap:8px}
.data-key{color:var(--text3);min-width:90px;flex-shrink:0}

/* ── New badge ── */
.new-badge{font-size:9px;background:var(--accent-dim);color:var(--accent);padding:1px 5px;border-radius:8px;font-weight:700}

/* ── Misc ── */
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent2);text-decoration:underline}
code{background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--accent2)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.section-header h2{font-size:14px;font-weight:600;color:var(--text)}
.flex-gap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Article edit mode */
#article-preview-content[contenteditable="true"] { outline: 2px solid #3b82f6; cursor: text; }
#article-preview-content[contenteditable="true"] img { cursor: pointer; transition: outline 0.15s; }
#article-preview-content[contenteditable="true"] img:hover { outline: 3px solid #f59e0b; }
#img-picker-panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 560px; max-width: 95vw; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4); z-index: 9999; padding: 20px; display: none;
}
#img-picker-panel.open { display: block; }
#img-picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9998; display: none; }
#img-picker-overlay.open { display: block; }
.img-picker-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; max-height: 320px; overflow-y: auto; margin-top: 12px; }
.img-picker-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.img-picker-grid img:hover { border-color: #3b82f6; }

/* Upload spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:#3b82f6; border-radius:50%; animation: spin .6s linear infinite; flex-shrink:0; }
#img-upload-status { align-items:center; gap:8px; font-size:12px; padding:6px 0; }

/* Rich text editor toolbar */
#editor-toolbar { flex-wrap:wrap; gap:3px; padding:6px 8px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; position:sticky; top:0; z-index:10; }
.tb-btn { padding:3px 8px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); cursor:pointer; font-size:12px; line-height:1.5; transition:background .1s; }
.tb-btn:hover, .tb-btn.active { background:var(--border); }
.tb-sep { width:1px; background:var(--border); margin:2px 4px; flex-shrink:0; align-self:stretch; }
.tb-sel { padding:3px 6px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); cursor:pointer; font-size:12px; }
</style>
</head>
<body>
<div class="app">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">✍️</div>
        <div>
          <div class="logo-text">Edurep AG</div>
          <div class="logo-sub">Article Generator</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Workspace</div>
        <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <span class="icon">📊</span>Dashboard
        </button>
        <button class="nav-item" data-page="articles" id="nav-articles">

        <button class="nav-item" data-page="calendar" id="nav-calendar">
          <span class="icon">📅</span>Calendar
        </button>

          <span class="icon">⏳</span>Queue

        <button class="nav-item" data-page="knowledge" id="nav-knowledge">

          <span class="icon">⚙️</span>Settings
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Content Tools <span class="new-badge">NEW</span></div>
        <button class="nav-item" data-page="trending" id="nav-trending">
          <span class="icon">🔥</span>Trending Topics
        </button>
        <button class="nav-item" data-page="schedule" id="nav-schedule">
          <span class="icon">🗓️</span>Article Schedule
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">SEO Suite</div>
        <button class="nav-item" data-page="gsc" id="nav-gsc">
          <span class="icon">📈</span>GSC Performance
        </button>
        <button class="nav-item" data-page="seo-health" id="nav-seo-health">
          <span class="icon">🩺</span>Site Health
        </button>
        <button class="nav-item" data-page="seo-broken" id="nav-seo-broken">
          <span class="icon">🔗</span>Broken Links
          <span class="nav-badge red" id="badge-broken"></span>
        </button>
        <button class="nav-item" data-page="seo-spam" id="nav-seo-spam">
          <span class="icon">🛡️</span>Spam Check
          <span class="nav-badge red" id="badge-spam"></span>
        </button>
        <button class="nav-item" data-page="seo-competitor" id="nav-seo-competitor">
          <span class="icon">🏆</span>Competitor
        </button>
        <button class="nav-item" data-page="seo-keyword" id="nav-seo-keyword">
          <span class="icon">🔍</span>Keyword Research
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div style="font-weight:600;color:var(--text2);margin-bottom:5px">System Status</div>
      <div class="api-status">

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const API = {
  h: () => ({ 'Content-Type':'application/json', 'x-api-key': 'claude2026' }),
  get:  (url)       => fetch(url, { headers: API.h() }).then(r=>r.json()),
  post: (url, data) => fetch(url, { method:'POST',  headers: API.h(), body: JSON.stringify(data||{}) }).then(r=>r.json()),
  patch:(url, data) => fetch(url, { method:'PATCH', headers: API.h(), body: JSON.stringify(data||{}) }).then(r=>r.json()),
  del:  (url)       => fetch(url, { method:'DELETE',headers: API.h() }).then(r=>r.json()),
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const state = {
  page: 'dashboard',
  stats: {},
  articles: { data:[], total:0, offset:0, limit:25, status:'all', search:'' },
  archive: { total:0, offset:0, limit:25, search:'', source:'all', dateFrom:'', dateTo:'' },
  calMonth: new Date(),
  currentArticle: null,
  currentUni: null,
  confirmCb: null,
  detailTab: 'info',
  uniTab: 'uni-info',
  uniEditMode: false,
};

// ═══════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════
let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show toast-${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className=''; }, 3000);
}

// ═══════════════════════════════════════════════════════════
//  MODAL HELPERS
// ═══════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function confirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  state.confirmCb = cb;
  openModal('modal-confirm');
}

document.getElementById('btn-confirm-ok').onclick = () => {
  closeModal('modal-confirm');
  if (state.confirmCb) state.confirmCb();
};

// Close modals via data-close buttons
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});

// Close modal on overlay click
['modal-add','modal-detail','modal-uni','modal-confirm'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
const PAGE_TITLES = {
  dashboard:'Dashboard', articles:'Articles', calendar:'Calendar',
  queue:'Queue', published:'Published', rejected:'Rejected',
  universities:'Universities', knowledge:'Knowledge Base', settings:'Settings', archive:'Archive (Semua Artikel)',
  trending:'Trending Topics', schedule:'Article Schedule',
  gsc:'GSC Performance', 'seo-health':'Site Health', 'seo-broken':'Broken Links',
  'seo-spam':'Spam Check', 'seo-competitor':'Competitor Analysis', 'seo-keyword':'Keyword Research'
};

function navigateFiltered(page, filter) {
  navigate(page);
  if (filter) {
    // After page renders, set the status dropdown and re-fetch
    setTimeout(() => {
      const sel = document.getElementById('art-status');
      if (sel && sel.value !== filter) {
        sel.value = filter;
        renderArticles(filter);
      }
    }, 150);
  }
}

function navigate(page) {
  state.page = page;
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // Update topbar title
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  // Show/hide new article button
  const btnNew = document.getElementById('btn-new-article');
  btnNew.classList.toggle('hidden', !['dashboard','articles','queue'].includes(page));
  // Render page
  renderPage(page);
}

// Wire up all nav-item buttons
document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.page));
});

// Topbar buttons
document.getElementById('btn-refresh').addEventListener('click', () => renderPage(state.page));
document.getElementById('btn-new-article').addEventListener('click', showAddModal);

// ═══════════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════════
function renderPage(page) {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="empty"><div class="empty-icon"><span class="spin" style="display:inline-block">⏳</span></div><div class="empty-text">Loading ${PAGE_TITLES[page]||page}...</div></div>`;
  ({
    dashboard:        renderDashboard,
    articles:         () => renderArticles('all'),
    queue:            () => { state.articles.status = 'queued,generating'; renderArticles('queued,generating'); },
    published:        () => renderArticles('published'),
    rejected:         () => renderArticles('rejected'),
    archive:          renderArchive,
    calendar:         renderCalendar,
    universities:     renderUniversities,
    knowledge:        renderKnowledge,
    settings:         renderSettings,
    trending:         renderTrending,
    schedule:         renderSchedule,
    gsc:              renderGsc,
    'seo-health':     renderSeoHealth,
    'seo-broken':     renderSeoBroken,
    'seo-spam':       renderSeoSpam,
    'seo-competitor': renderSeoCompetitor,
    'seo-keyword':    renderSeoKeyword,
  }[page] || renderDashboard)();
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
function fmtDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtDt(s) {
  if (!s) return '—';
  return new Date(s).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
function badge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}
function qcBadge(score) {
  if (!score) return '<span style="color:var(--text3)">—</span>';
  const cls = score >= 70 ? 'qc-high' : score >= 50 ? 'qc-mid' : 'qc-low';
  return `<span class="qc-score ${cls}">★ ${score}</span>`;
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setHtml(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}
function emptyState(icon, text, subtext='') {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div>${subtext?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${subtext}</div>`:''}</div>`;
}

// ═══════════════════════════════════════════════════════════
//  HEALTH CHECK + BADGE REFRESH
// ═══════════════════════════════════════════════════════════
async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const dot = document.getElementById('dot-api');
    const lbl = document.getElementById('status-api');
    if (r.ok) {
      dot.className = 'status-dot ok';
      lbl.textContent = 'API Online';
    } else { throw new Error(); }
  } catch {
    document.getElementById('dot-api').className = 'status-dot err';
    document.getElementById('status-api').textContent = 'API Offline';
  }
}

async function refreshBadges() {
  try {
    const s = await API.get('/api/articles/stats');
    state.stats = s;
    const d = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val||''; };
    d('badge-draft', s.draft || '');
    d('badge-queue', (s.queued||0)+(s.generating||0) || '');
    d('badge-published', s.published || '');
  } catch {}
  try {
    const a = await API.get('/api/archive/stats');
    const el = document.getElementById('badge-archive');
    if (el) el.textContent = a.total || '';
  } catch {}
}

// ═══════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderDashboard() {
  try {
    const [stats, queue] = await Promise.all([
      API.get('/api/articles/stats'),
      API.get('/api/articles/queue/status'),
    ]);
    state.stats = stats;
    refreshBadges();

    const statCards = [
      { label:'Total',      value: stats.total||0,      color:'var(--text)',   page:'articles',   filter:''          },
      { label:'Queue',      value: (stats.queued||0)+(stats.generating||0), color:'var(--blue)',   page:'queue',      filter:'queued,generating' },
      { label:'Draft',      value: stats.draft||0,       color:'var(--yellow)', page:'articles',   filter:'draft'     },
      { label:'Scheduled',  value: stats.scheduled||0,   color:'var(--orange)', page:'articles',   filter:'scheduled' },
      { label:'Published',  value: stats.published||0,   color:'var(--green)',  page:'published',  filter:''          },
      { label:'Rejected',   value: stats.rejected||0,    color:'var(--red)',    page:'rejected',   filter:''          },
      { label:'Error',      value: stats.error||0,       color:'var(--red)',    page:'articles',   filter:'error'     },
    ];

    const queueInfo = queue.running
      ? `<span style="color:var(--blue);font-weight:600">● Running</span> — ${queue.queued} in queue`
      : `<span style="color:var(--text3)">● Idle</span>`;

    const html = `
      <div class="stats-grid">
        ${statCards.map(c => `
          <div class="stat-card" onclick="navigateFiltered('${c.page}','${c.filter||''}')">
            <div class="stat-value" style="color:${c.color}">${c.value}</div>
            <div class="stat-label">${c.label}</div>
          </div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="card">
          <div class="section-header"><h2>Pipeline Status</h2></div>
          <div style="font-size:13px;margin-bottom:10px">${queueInfo}</div>
          ${queue.running || queue.queued > 0 ? `
            <div style="font-size:12px;color:var(--text3);margin-bottom:10px">
              Article IDs in queue: ${queue.queue?.slice(0,8).join(', ')||'—'}${queue.queue?.length>8?' ...':''}
            </div>` : ''}
          <div class="flex-gap">
            <button class="btn btn-ghost btn-sm" onclick="runAllQueued()">▶ Run All Queued</button>
            <button class="btn btn-ghost btn-sm" onclick="syncRmScore()">↻ Sync RM Score</button>
          </div>
        </div>
        <div class="card">
          <div class="section-header"><h2>Quick Actions</h2></div>
          <div class="flex-gap" style="flex-direction:column;align-items:flex-start;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="showAddModal()">＋ Add Article</button>
            <button class="btn btn-ghost btn-sm" onclick="navigate('calendar')">📅 View Calendar</button>
            <button class="btn btn-ghost btn-sm" onclick="window.open('http://43.134.15.212:3006','_blank')">🎓 Manage Universities</button>
            <button class="btn btn-ghost btn-sm" onclick="navigate('gsc')">📈 GSC Performance</button>
            <button class="btn btn-ghost btn-sm" onclick="navigate('trending')">🔥 Trending Topics</button>
            <button class="btn btn-ghost btn-sm" onclick="navigate('schedule')">🗓️ Article Schedule</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('content').innerHTML = html;
  } catch(e) {
    document.getElementById('content').innerHTML = emptyState('⚠️', 'Gagal load dashboard', e.message);
  }
}

// ═══════════════════════════════════════════════════════════
//  ARTICLES LIST
// ═══════════════════════════════════════════════════════════
async function renderArticles(statusFilter) {
  const s = state.articles;
  if (statusFilter !== undefined) { s.status = statusFilter; s.offset = 0; }
  // Support comma-separated statuses e.g. 'queued,generating'
  try {
    const statusVal = s.status || 'all';
    const params = new URLSearchParams({
      status: statusVal, limit: s.limit, offset: s.offset,
      ...(s.search ? { search: s.search } : {})
    });
    const data = await API.get(`/api/articles?${params}`);
    const { articles, total } = data;
    const pages = Math.ceil(total / s.limit);
    const curPage = Math.floor(s.offset / s.limit) + 1;

    const filterBar = `
      <div class="filter-bar">
        <input id="art-search" placeholder="Cari judul / keyword..." value="${esc(s.search)}" style="max-width:220px">
        <select id="art-status">
          ${['all','queued,generating','queued','generating','draft','scheduled','published','rejected','error'].map(v =>
            `<option value="${v}" ${s.status===v?'selected':''}>${v==='all'?'All Status':v==='queued,generating'?'Queue (active)':v}</option>`).join('')}
        </select>
        <button class="btn btn-ghost btn-sm" id="art-search-btn">Cari</button>
        <span style="margin-left:auto;font-size:12px;color:var(--text3)">${total} artikel</span>
      </div>`;

    const rows = articles.length === 0
      ? `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Tidak ada artikel</td></tr>`
      : articles.map(a => `
        <tr>
          <td class="td-title">
            <span class="td-title-text">${esc(a.title)}</span>
            <span class="td-sub">${esc(a.focus_keyword||a.keyword||'')}</span>
          </td>
          <td>${badge(a.status)}</td>
          <td>${qcBadge(a.qc_score)}</td>
          <td style="font-size:12px;color:var(--text3)">${fmtDate(a.created_at)}</td>
          <td>${a.wp_url ? `<a href="${esc(a.wp_url)}" target="_blank" style="font-size:11px">↗ WP</a>` : '—'}</td>
          <td class="td-actions">
            <button class="btn btn-ghost btn-sm" onclick="openDetail(${a.id})">Detail</button>
            ${a.status==='draft'?`<button class="btn btn-success btn-sm" onclick="approveArticle(${a.id})">✓ Approve</button>`:''}
            ${['error','rejected','queued'].includes(a.status)?`<button class="btn btn-warning btn-sm" onclick="rerunArticle(${a.id})">↺ Run</button>`:''}
            <button class="btn btn-danger btn-sm" onclick="deleteArticle(${a.id}, '${esc(a.title)}')">✕</button>
          </td>
        </tr>`).join('');

    const pagination = pages > 1 ? `
      <div class="flex-gap" style="justify-content:center;margin-top:12px">
        <button class="btn btn-ghost btn-sm" ${curPage<=1?'disabled':''} onclick="artPage(${curPage-2})">← Prev</button>
        <span style="font-size:12px;color:var(--text3)">Hal ${curPage} / ${pages}</span>
        <button class="btn btn-ghost btn-sm" ${curPage>=pages?'disabled':''} onclick="artPage(${curPage})">Next →</button>
      </div>` : '';

    document.getElementById('content').innerHTML = `
      ${filterBar}
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Judul</th><th>Status</th><th>QC</th><th>Dibuat</th><th>WP</th><th>Aksi</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${pagination}
    `;

    // Wire filter bar
    document.getElementById('art-search-btn').onclick = () => {
      s.search = document.getElementById('art-search').value;
      s.status = document.getElementById('art-status').value;
      s.offset = 0;
      renderArticles();
    };
    document.getElementById('art-search').onkeydown = e => {
      if (e.key==='Enter') document.getElementById('art-search-btn').click();
    };
    document.getElementById('art-status').onchange = () => {
      document.getElementById('art-search-btn').click();
    };
  } catch(e) {
    document.getElementById('content').innerHTML = emptyState('⚠️','Gagal load articles',e.message);
  }
}

function artPage(pageIdx) {
  state.articles.offset = pageIdx * state.articles.limit;
  renderArticles();
}

// ═══════════════════════════════════════════════════════════
//  ARCHIVE — Article Generator + WP Full-Site Backup (gabungan)
// ════════════════════════════════════════════════════════════════
async function renderArchive() {
  const s = state.archive;
  try {
    const params = new URLSearchParams({
      source: s.source, limit: s.limit, offset: s.offset,
      ...(s.search ? { search: s.search } : {}),
      ...(s.dateFrom ? { date_from: s.dateFrom } : {}),
      ...(s.dateTo ? { date_to: s.dateTo } : {}),
    });
    const [data, allStats] = await Promise.all([
      API.get(`/api/archive?${params}`),
      API.get('/api/archive/stats'),
    ]);
    const { articles, total, sources, wp_backup_available } = data;
    const pages = Math.ceil(total / s.limit);
    const curPage = Math.floor(s.offset / s.limit) + 1;

    const totalCard = `
      <div class="card" style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Total Semua Artikel</div>
          <div style="font-size:28px;font-weight:700;color:var(--text)">${allStats.total||0}</div>
        </div>
        <div style="display:flex;gap:18px;font-size:12px;color:var(--text2)">
          <div><span style="color:var(--accent);font-weight:600">${allStats.generator||0}</span> dari Article Generator</div>
          <div><span style="color:var(--purple);font-weight:600">${allStats.wp_backup||0}</span> dari WP Backup</div>
        </div>
      </div>`;

    const filterBar = `
      <div class="filter-bar" style="flex-wrap:wrap">
        <input id="arc-search" placeholder="Cari judul artikel..." value="${esc(s.search)}" style="max-width:220px">
        <select id="arc-source">
          <option value="all" ${s.source==='all'?'selected':''}>Semua Sumber</option>
          <option value="generator" ${s.source==='generator'?'selected':''}>Article Generator (${sources?.generator??0})</option>
          <option value="wp_backup" ${s.source==='wp_backup'?'selected':''}>WP Backup (${sources?.wp_backup??0})</option>
        </select>
        <span style="font-size:11px;color:var(--text3)">📅 Dari</span>
        <input type="date" id="arc-date-from" value="${esc(s.dateFrom)}" style="max-width:150px">
        <span style="font-size:11px;color:var(--text3)">Sampai</span>
        <input type="date" id="arc-date-to" value="${esc(s.dateTo)}" style="max-width:150px">
        <button class="btn btn-ghost btn-sm" id="arc-search-btn">Cari</button>
        ${(s.dateFrom||s.dateTo) ? `<button class="btn btn-ghost btn-sm" id="arc-date-reset">✕ Reset Tanggal</button>` : ''}
        <span style="margin-left:auto;font-size:12px;color:var(--text3)">${total} artikel (terfilter)</span>
      </div>
      ${!wp_backup_available ? `<div style="font-size:12px;color:var(--red);margin-bottom:10px">⚠️ wp_articles_backup.db tidak terbaca di server</div>` : ''}`;

    const sourceTag = (src) => src === 'generator'
      ? `<span class="badge" style="background:var(--accent-dim);color:var(--accent)">Generator</span>`
      : `<span class="badge" style="background:var(--purple-dim);color:var(--purple)">WP Backup</span>`;

    const rows = articles.length === 0
      ? `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Tidak ada artikel</td></tr>`
      : articles.map(a => `
        <tr>
          <td class="td-title">
            <span class="td-title-text">${esc(a.title)}</span>
            <span class="td-sub">${esc(a.keyword||'')}</span>
          </td>
          <td>${sourceTag(a.source)}</td>
          <td>${badge(a.status)}</td>
          <td style="font-size:12px;color:var(--text3)">${a.word_count||'—'}</td>
          <td style="font-size:12px;color:var(--text3)">${fmtDate(a.published_date||a.created_at)}</td>
          <td class="td-actions">
            ${a.url ? `<a href="${esc(a.url)}" target="_blank" class="btn btn-ghost btn-sm">↗ Lihat</a>` : '<span style="color:var(--text3)">—</span>'}
          </td>
        </tr>`).join('');

    const pagination = pages > 1 ? `
      <div class="flex-gap" style="justify-content:center;margin-top:12px">
        <button class="btn btn-ghost btn-sm" ${curPage<=1?'disabled':''} onclick="archivePage(${curPage-2})">← Prev</button>
        <span style="font-size:12px;color:var(--text3)">Hal ${curPage} / ${pages}</span>
        <button class="btn btn-ghost btn-sm" ${curPage>=pages?'disabled':''} onclick="archivePage(${curPage})">Next →</button>
      </div>` : '';

    document.getElementById('content').innerHTML = `
      ${totalCard}
      ${filterBar}
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Judul</th><th>Sumber</th><th>Status</th><th>Words</th><th>Tanggal</th><th>Link</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${pagination}
    `;

    document.getElementById('arc-search-btn').onclick = () => {
      s.search = document.getElementById('arc-search').value;
      s.source = document.getElementById('arc-source').value;
      s.dateFrom = document.getElementById('arc-date-from').value;
      s.dateTo = document.getElementById('arc-date-to').value;
      s.offset = 0;
      renderArchive();
    };
    document.getElementById('arc-search').onkeydown = e => {
      if (e.key==='Enter') document.getElementById('arc-search-btn').click();
    };
    document.getElementById('arc-source').onchange = () => {
      document.getElementById('arc-search-btn').click();
    };
    document.getElementById('arc-date-from').onchange = () => {
      document.getElementById('arc-search-btn').click();
    };
    document.getElementById('arc-date-to').onchange = () => {
      document.getElementById('arc-search-btn').click();
    };
    const arcDateReset = document.getElementById('arc-date-reset');
    if (arcDateReset) arcDateReset.onclick = () => {
      s.dateFrom = ''; s.dateTo = ''; s.offset = 0;
      renderArchive();
    };
  } catch(e) {
    document.getElementById('content').innerHTML = emptyState('⚠️','Gagal load archive', e.message);
  }
}

function archivePage(pageIdx) {
  state.archive.offset = pageIdx * state.archive.limit;
  renderArchive();
}

// ═══════════════════════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════════════════════
async function renderCalendar() {
  const m = state.calMonth;
  const monthStr = `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}`;
  try {
    const articles = await API.get(`/api/articles/calendar?month=${monthStr}`);
    const byDay = {};
    articles.forEach(a => {
      const d = (a.scheduled_date||a.published_date||a.created_at||'').split('T')[0];
      if (!byDay[d]) byDay[d]=[];
      byDay[d].push(a);
    });
    const y = m.getFullYear(), mo = m.getMonth();
    const firstDay = new Date(y,mo,1).getDay();
    const daysInMonth = new Date(y,mo+1,0).getDate();
    const today = new Date().toISOString().split('T')[0];

    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const dayLabels = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

    let cells = '';
    // Empty cells before start
    for (let i=0;i<firstDay;i++) cells += `<div class="cal-day other-month"></div>`;
    for (let d=1;d<=daysInMonth;d++) {
      const ds = `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = ds===today;
      const evts = byDay[ds]||[];
      cells += `<div class="cal-day${isToday?' today':''}">
        <div class="cal-date">${d}</div>
        ${evts.slice(0,3).map(a=>`<div class="cal-event ${a.status}" title="${esc(a.title)}" onclick="openDetail(${a.id})">${esc(a.title)}</div>`).join('')}
        ${evts.length>3?`<div style="font-size:10px;color:var(--text3)">+${evts.length-3} lagi</div>`:''}
      </div>`;
    }

    document.getElementById('content').innerHTML = `
      <div class="calendar-header">
        <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">‹</button>
        <span class="calendar-month">${monthNames[mo]} ${y}</span>
        <button class="btn btn-ghost btn-sm" onclick="calNav(1)">›</button>
        <button class="btn btn-ghost btn-sm" onclick="calToday()">Hari ini</button>
        <span style="margin-left:auto;font-size:12px;color:var(--text3)">${articles.length} artikel bulan ini</span>
      </div>
      <div class="calendar-grid">
        ${dayLabels.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
        ${cells}
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = emptyState('⚠️','Gagal load calendar',e.message);
  }
}

function calNav(dir) {
  const m = state.calMonth;
  state.calMonth = new Date(m.getFullYear(), m.getMonth()+dir, 1);
  renderCalendar();
}
function calToday() {
  state.calMonth = new Date();
  renderCalendar();
}

// ── Universities state ──
const uniState = {
  search:'', country:'all', tier:'all', status:'all',
  view:'card', // 'card' | 'table'
  limit:50, offset:0, total:0,
  countries:[], syncPollers:{},
};

async function renderUniversities() {
  // Load countries for filter
  if (!uniState.countries.length) {
    try { uniState.countries = await API.get('/api/universities/countries'); } catch(e) {}
  }
  await loadUniList();
}

async function loadUniList() {
  const params = new URLSearchParams({
    limit: uniState.limit, offset: uniState.offset,
    ...(uniState.search  ? {search:  uniState.search}  : {}),
    ...(uniState.country !== 'all' ? {country: uniState.country} : {}),
    ...(uniState.tier    !== 'all' ? {tier:    uniState.tier}    : {}),
    ...(uniState.status  !== 'all' ? {status:  uniState.status}  : {}),
  });

  let unis=[], total=0;
  try {
    const data = await API.get(`/api/universities?${params}`);
    unis  = data.universities||[];
    total = data.total||unis.length;
    uniState.total = total;
    const el = document.getElementById('badge-unis');
    if (el) el.textContent = total||'';
  } catch(e) {
    document.getElementById('content').innerHTML = emptyState('⚠️','Gagal load universities',e.message);
    return;
  }

  const pages   = Math.ceil(total / uniState.limit);
  const curPage = Math.floor(uniState.offset / uniState.limit) + 1;

  const syncStatusChip = (u) => {
    if (u.sync_status==='running') return `<span class="seo-result-chip chip-warn" style="font-size:10px">⏳ Syncing</span>`;
    if (u.sync_status==='done')    return `<span class="seo-result-chip chip-ok"   style="font-size:10px">✓ ${u.data_freshness_score||0}%</span>`;
    if (u.sync_status==='error')   return `<span class="seo-result-chip chip-err"  style="font-size:10px">✗ Error</span>`;
    return `<span class="seo-result-chip chip-gray" style="font-size:10px">No data</span>`;
  };

  const tierBadge = t => {
    const n = parseInt(t)||0;
    const cls = n===1?'tier-1':n===2?'tier-2':'tier-3';
    return `<span class="badge ${cls}">T${n}</span>`;
  };

  const statusBadge = s => {
    const map = {'Partner':'badge-published','Non Partner':'badge-queued','Prospect':'badge-draft','On Process':'badge-generating'};
    return `<span class="badge ${map[s]||'badge-queued'}" style="font-size:10px">${esc(s||'—')}</span>`;
  };

  // ── Stat bar: load stats ──
  let stats = {};
  try { stats = await API.get('/api/universities/stats'); } catch(e) {}
  const synced = stats.synced||0;
  const syncPct = stats.total ? Math.round(synced/stats.total*100) : 0;

  // ── Filter bar HTML ──
  const countryOpts = ['all',...(uniState.countries||[])].map(c=>
    `<option value="${c}" ${uniState.country===c?'selected':''}>${c==='all'?'All Countries':c}</option>`).join('');

  const filterBar = `
    <div class="filter-bar" style="margin-bottom:10px">
      <input id="uni-search-inp" placeholder="🔍 Nama universitas..." value="${esc(uniState.search)}" style="max-width:200px;flex:1;min-width:140px">
      <select id="uni-country-sel">${countryOpts}</select>
      <select id="uni-tier-sel">
        <option value="all" ${uniState.tier==='all'?'selected':''}>All Tier</option>
        ${['1','2','3'].map(v=>`<option value="${v}" ${uniState.tier===v?'selected':''}>Tier ${v}</option>`).join('')}
      </select>
      <select id="uni-status-sel">
        ${['all','Partner','Non Partner','Prospect','On Process'].map(v=>
          `<option value="${v}" ${uniState.status===v?'selected':''}>${v==='all'?'All Status':v}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-sm" id="uni-filter-btn">Cari</button>
      <button class="btn btn-ghost btn-sm" id="uni-view-toggle" title="Toggle view">${uniState.view==='card'?'☰ Table':'▦ Card'}</button>
    </div>`;

  // ── Summary bar ──
  const summaryBar = `
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)">
      <span style="font-size:13px;font-weight:600">${total} universitas</span>
      <span style="font-size:11px;color:var(--text3)">·</span>
      <span style="font-size:12px;color:var(--text2)">Synced: <strong style="color:${syncPct>50?'var(--green)':'var(--yellow)'}">${synced} (${syncPct}%)</strong></span>
      <span style="font-size:11px;color:var(--text3)">·</span>
      <span style="font-size:12px;color:var(--text2)">Halaman ${curPage}/${pages||1}</span>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">

  unis.filter(u=>u.sync_status==='running').forEach(u => pollUniSync(u.id));

function uniApplyFilter() {
  uniState.search  = document.getElementById('uni-search-inp')?.value||'';
  uniState.country = document.getElementById('uni-country-sel')?.value||'all';
  uniState.tier    = document.getElementById('uni-tier-sel')?.value||'all';
  uniState.status  = document.getElementById('uni-status-sel')?.value||'all';
  uniState.offset  = 0;
  loadUniList();
}

function uniPage(pageIdx) {
  uniState.offset = pageIdx * uniState.limit;
  loadUniList();
}

function uniCheckAll(cb) {
  document.querySelectorAll('.uni-chk').forEach(c => { c.checked = cb.checked; });
  updateUniSelection();
}

function updateUniSelection() {
  const checked = document.querySelectorAll('.uni-chk:checked');
  const bulk = document.getElementById('uni-bulk-actions');
  const cnt  = document.getElementById('uni-selected-count');
  if (bulk) bulk.classList.toggle('hidden', checked.length===0);
  if (cnt)  cnt.textContent = `${checked.length} dipilih`;
}

async function bulkSyncSelected() {
  const ids = [...document.querySelectorAll('.uni-chk:checked')].map(c=>parseInt(c.value));
  if (!ids.length) return;
  try {
    const r = await API.post('/api/universities/sync/batch', { ids });
    toast(`Sync dimulai untuk ${r.count} universitas`);
    ids.forEach(id => pollUniSync(id));
  } catch(e) { toast('Error: '+e.message,'err'); }
}

// ── Sync satu universitas ──
async function syncUni(id, name) {
  const btn = document.getElementById(`sync-btn-${id}`);
  if (btn) { btn.disabled=true; btn.textContent='⏳'; }
  try {
    await API.post(`/api/universities/${id}/sync`);
    toast(`Sync ${name} dimulai...`);
    pollUniSync(id);
  } catch(e) { toast('Error: '+e.message,'err'); if(btn){btn.disabled=false;btn.textContent='↻ Sync';} }
}

// Polling sync status
function pollUniSync(id) {
  if (uniState.syncPollers[id]) return; // already polling
  uniState.syncPollers[id] = setInterval(async () => {
    try {
      const s = await API.get(`/api/universities/${id}/sync/status`);
      // Update chip di card/row
      const chipHtml = s.sync_status==='running'
        ? `<span class="seo-result-chip chip-warn" style="font-size:10px">⏳ Syncing</span>`
        : s.sync_status==='done'
          ? `<span class="seo-result-chip chip-ok" style="font-size:10px">✓ ${s.data_freshness_score||0}%</span>`
          : `<span class="seo-result-chip chip-err" style="font-size:10px">✗ Error</span>`;
      // Card view
      const card = document.getElementById(`uni-card-${id}`);
      if (card) {
        const chip = card.querySelector('.seo-result-chip');
        if (chip) chip.outerHTML = chipHtml;
      }
      // Table view
      const row = document.getElementById(`uni-row-${id}`);
      if (row) {
        const chips = row.querySelectorAll('.seo-result-chip');
        chips.forEach(c => c.outerHTML = chipHtml);
        const btn = document.getElementById(`sync-btn-${id}`);
        if (btn) { btn.disabled=false; btn.textContent='↻ Sync'; }
      }
      if (s.sync_status !== 'running') {
        clearInterval(uniState.syncPollers[id]);
        delete uniState.syncPollers[id];
        if (s.sync_status==='done') toast(`✓ Sync selesai: ${s.name} (score ${s.data_freshness_score}%)`);
        if (s.sync_status==='error') toast(`✗ Sync error: ${s.sync_error||'unknown'}`, 'err');
      }
    } catch(e) {
      clearInterval(uniState.syncPollers[id]);
      delete uniState.syncPollers[id];
    }
  }, 4000);
}

    return `<div style="text-align:center;padding:40px;color:var(--text3)">

    </div>`;
  }

  const programs  = d.programs||d.programs_mentioned||[];
  const tuition   = d.tuition||d.tuition_updates||[];
  const req       = d.entry_requirements||{};
  const reqUG     = req.undergraduate||req.ug||{};
  const reqPG     = req.postgraduate||req.pg||{};
  const intake    = d.intake||d.intake_dates||[];
  const scholar   = d.scholarships||d.scholarship_updates||[];
  const ranking   = d.ranking||d.ranking_updates||[];
  const campus    = d.campus||{};
  const stats     = d.student_stats||{};
  const faqs      = d.faqs||d.faq||[];
  const deadlines = d.important_deadlines||d.deadlines||[];
  const contact   = d.contact||{};
  const ielts     = d.ielts_requirements||[];

  const section = (icon, title, content, id='') =>
    `<div class="data-section" style="margin-bottom:12px" ${id?`id="${id}"`:''}><div class="data-section-title">${icon} ${title}</div>${content}</div>`;

  const tag = (t, color='var(--accent)', bg='var(--accent-dim)') =>
    `<span style="display:inline-flex;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:500;background:${bg};color:${color};margin:2px">${esc(String(t))}</span>`;

  const noData = (msg='Belum ada data') =>
    `<div style="color:var(--text3);font-size:12px;font-style:italic;padding:6px 0">${msg}</div>`;

  // ── Quick copy box untuk article writer ──
  const summaryBox = `<div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:12px">
    <div style="font-weight:700;color:var(--accent);margin-bottom:6px">📝 Quick Summary untuk Artikel</div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;color:var(--text)">
      ${ranking.length?`<span>🏆 Ranking: <strong>${esc(String(ranking[0].rank||ranking[0].position||'?'))} ${esc(String(ranking[0].source||''))}</strong></span>`:''}
      ${campus.city?`<span>📍 <strong>${esc(campus.city)}</strong></span>`:''}
      ${stats.total_students?`<span>👥 <strong>${esc(String(stats.total_students))}</strong> mahasiswa</span>`:''}
      ${stats.founded_year?`<span>🏛 Berdiri <strong>${esc(String(stats.founded_year))}</strong></span>`:''}
      ${intake.length?`<span>📅 Intake: <strong>${intake.slice(0,2).map(i=>esc(String(i.intake||i.semester||i))).join(', ')}</strong></span>`:''}
      ${reqUG.ielts_min?`<span>📖 IELTS UG: <strong>${esc(String(reqUG.ielts_min))}</strong></span>`:''}
      ${reqPG.ielts_min?`<span>📖 IELTS PG: <strong>${esc(String(reqPG.ielts_min))}</strong></span>`:''}
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3)">Strategy: ${esc(d.strategy_used||'—')} · Synced: ${d.last_sync_date?fmtDate(d.last_sync_date):'—'}</div>
  </div>`;

  // ── PROGRAMS ──
  const programsHtml = programs.length===0 ? noData() : (() => {
    const lvlMap = {};
    programs.forEach(p => {
      const name = typeof p==='object'?(p.name||p.title||JSON.stringify(p)):String(p);
      const lvl  = (typeof p==='object'&&p.level)||'General';
      if (!lvlMap[lvl]) lvlMap[lvl]=[];
      lvlMap[lvl].push(name);
    });
    return Object.entries(lvlMap).map(([lvl, progs])=>`
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px">${esc(lvl)} (${progs.length})</div>
        <div>${progs.map(p=>tag(p)).join('')}</div>
      </div>`).join('');
  })();

  // ── TUITION FEE ──
  const tuitionHtml = tuition.length===0 ? noData() :
    `<div class="table-wrap"><table>
      <thead><tr><th>Program / Jenjang</th><th>Biaya</th><th>Mata Uang</th><th>Per</th><th>Catatan</th></tr></thead>
      <tbody>${tuition.map(t=>`<tr>
        <td>${esc(String(t.program||t.name||t.level||'—'))}</td>
        <td style="font-weight:700;color:var(--accent)">${esc(String(t.fee_amount||t.fee||t.amount||t.tuition||'—'))}</td>
        <td>${esc(String(t.fee_currency||t.currency||'—'))}</td>
        <td>${esc(String(t.fee_period||t.period||t.per||t.frequency||'per year'))}</td>
        <td style="font-size:11px;color:var(--text3)">${esc(String(t.note||t.notes||''))}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  // ── REQUIREMENTS ──
  const buildReqBlock = (level, r) => {
    if (!r||!Object.keys(r).length) return '';
    return `<div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;padding:4px 10px;background:var(--surface2);border-radius:var(--rs);display:inline-block">${esc(level)}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
        ${r.ielts_min?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:var(--accent)">${esc(String(r.ielts_min))}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase">IELTS Min</div>
        </div>`:''}
        ${r.toefl_min?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:var(--blue)">${esc(String(r.toefl_min))}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase">TOEFL Min</div>
        </div>`:''}
        ${r.gpa_min?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:var(--green)">${esc(String(r.gpa_min))}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase">GPA Min</div>
        </div>`:''}
        ${r.sat_min?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:var(--purple)">${esc(String(r.sat_min))}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase">SAT Min</div>
        </div>`:''}
      </div>
      ${r.gmat_min?`<div style="font-size:12px;color:var(--text2);margin-top:6px">GMAT min: <strong>${esc(String(r.gmat_min))}</strong></div>`:''}
      ${r.notes||r.other?`<div style="font-size:11px;color:var(--text3);margin-top:6px;padding:6px 8px;background:var(--surface2);border-radius:4px">${esc(String(r.notes||r.other))}</div>`:''}
    </div>`;
  };

  const hasReq = Object.keys(reqUG).length || Object.keys(reqPG).length || ielts.length;
  const reqHtml = !hasReq ? noData() : `
    ${buildReqBlock('Undergraduate (S1)', reqUG)}
    ${buildReqBlock('Postgraduate (S2/S3)', reqPG)}
    ${ielts.length?`<div style="margin-top:8px">
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px">Syarat IELTS per Program</div>
      <div class="table-wrap"><table><thead><tr><th>Program</th><th>IELTS Score</th></tr></thead>
        <tbody>${ielts.map(i=>`<tr><td>${esc(String(i.program||'—'))}</td><td style="font-weight:700">${esc(String(i.score||'—'))}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}`;

  // ── RANKING ──
  const rankingHtml = ranking.length===0 ? noData() :
    `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      ${ranking.map(r=>`<div style="background:var(--accent-dim);border:1px solid rgba(79,70,229,.2);border-radius:var(--r);padding:12px 16px;text-align:center;min-width:100px">
        <div style="font-size:22px;font-weight:800;color:var(--accent)">#${esc(String(r.rank||r.position||'?'))}</div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);margin-top:2px">${esc(String(r.source||r.type||'—'))}</div>
        ${r.year?`<div style="font-size:10px;color:var(--text3)">${esc(String(r.year))}</div>`:''}
        ${r.subject?`<div style="font-size:10px;color:var(--text3)">${esc(String(r.subject))}</div>`:''}
      </div>`).join('')}
    </div>`;

  // ── SCHOLARSHIPS ──
  const scholarHtml = scholar.length===0 ? noData() :
    `<div class="table-wrap"><table>
      <thead><tr><th>Nama Beasiswa</th><th>Nominal</th><th>Syarat</th><th>Deadline</th><th>Jenjang</th></tr></thead>
      <tbody>${scholar.map(s=>`<tr>
        <td style="font-weight:500">${esc(String(s.name||'—'))}</td>
        <td style="color:var(--green);font-weight:600">${esc(String(s.amount||s.nominal||'—'))} ${esc(String(s.currency||''))}</td>
        <td style="font-size:11px;color:var(--text2)">${esc(String(s.requirements||s.eligibility||s.syarat||'—'))}</td>
        <td style="color:var(--orange);font-size:11px">${esc(String(s.deadline||'—'))}</td>
        <td style="font-size:11px">${esc(String(s.level||s.jenjang||'—'))}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;

  // ── INTAKE / DEADLINES ──
  const intakeHtml = (intake.length||deadlines.length)===0 ? noData() : `
    ${intake.length?`<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">Intake Dates</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${intake.map(i=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;font-size:12px">
          <div style="font-weight:600">${esc(String(i.intake||i.semester||i.period||'—'))}</div>
          ${i.year?`<div style="font-size:10px;color:var(--text3)">${esc(String(i.year))}</div>`:''}
          ${i.deadline?`<div style="font-size:11px;color:var(--orange)">Deadline: ${esc(String(i.deadline))}</div>`:''}
          ${i.open?`<div style="font-size:10px;color:var(--blue)">Open: ${esc(String(i.open))}</div>`:''}
        </div>`).join('')}
      </div>
    </div>`:''}
    ${deadlines.length?`<div>
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">Important Deadlines</div>
      ${deadlines.map(dl=>`<div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span style="color:var(--orange);flex-shrink:0;min-width:90px">${esc(String(dl.date||'—'))}</span>
        <span>${esc(String(dl.event||dl.description||'—'))}</span>
      </div>`).join('')}
    </div>`:''}`;

  // ── CAMPUS INFO ──
  const campusHtml = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:10px">
      ${campus.city?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Lokasi</div>${esc(campus.city)}${campus.country?', '+esc(campus.country):''}</div>`:''}
      ${stats.founded_year?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Berdiri</div>${esc(String(stats.founded_year))}</div>`:''}
      ${stats.total_students?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Mahasiswa</div>${esc(String(stats.total_students))}</div>`:''}
      ${stats.international_students?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Intl. Students</div>${esc(String(stats.international_students))}</div>`:''}
      ${campus.type?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Tipe</div>${esc(String(campus.type))}</div>`:''}
      ${stats.student_staff_ratio?`<div class="data-section" style="margin-bottom:0"><div class="data-section-title">Student:Staff</div>${esc(String(stats.student_staff_ratio))}</div>`:''}
    </div>
    ${campus.address?`<div style="font-size:12px;color:var(--text2)">📍 ${esc(campus.address)}</div>`:''}
    ${contact.email||contact.phone?`<div style="font-size:12px;color:var(--text2);margin-top:4px">
      ${contact.phone?`📞 ${esc(contact.phone)}`:''}
      ${contact.email?` · ✉ <a href="mailto:${esc(contact.email)}">${esc(contact.email)}</a>`:''}
    </div>`:''}
    ${campus.facilities?.length?`<div style="margin-top:8px"><div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px">Fasilitas</div>
      <div>${campus.facilities.map(f=>tag(typeof f==='object'?(f.name||f):f,'var(--text2)','var(--surface3)')).join('')}</div>
    </div>`:''}`;

  const hasCampus = campus.city||stats.founded_year||stats.total_students||contact.email;

  // ── FAQ ──
  const faqHtml = faqs.length===0 ? '' :
    `<div>${faqs.slice(0,8).map(f=>`<div style="margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:var(--rs);border-left:3px solid var(--accent)">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">❓ ${esc(String(f.question||f.q||''))}</div>
      <div style="font-size:12px;color:var(--text2)">${esc(String(f.answer||f.a||''))}</div>
    </div>`).join('')}</div>`;

  return `
    ${summaryBox}
    ${section('🎓', `Program / Jurusan (${programs.length})`, programsHtml)}
    ${section('💰', 'Biaya Kuliah (Tuition Fee)', tuitionHtml)}
    ${section('📝', 'Syarat Masuk (Entry Requirements)', reqHtml)}
    ${section('🏆', `Ranking (${ranking.length})`, rankingHtml)}
    ${section('🎁', `Beasiswa (${scholar.length})`, scholarHtml)}
    ${section('📅', 'Intake & Deadline', intakeHtml)}
    ${hasCampus ? section('🏛', 'Info Kampus', campusHtml) : ''}
    ${faqs.length ? section('❓', `FAQ (${faqs.length})`, faqHtml) : ''}
  `;
}

let _dataEditMode = false;

function toggleDataEdit(uniId) {
  _dataEditMode = !_dataEditMode;
  const panel = document.getElementById('tab-panel-uni-data');
  const btn   = panel?.querySelector('#data-tab-editbar button');
  if (_dataEditMode) {
    if (btn) btn.textContent = '✕ Batal Edit';
    const u = state.currentUni;
    let d = {};
    try { d = JSON.parse(u.data_json||'{}'); } catch(e) {}
    // Insert edit form setelah editbar, ganti konten di bawahnya
    const editbar = document.getElementById('data-tab-editbar');
    if (!editbar) return;
    // Hapus semua konten setelah editbar
    let sib = editbar.nextSibling;
    while (sib) { const next = sib.nextSibling; sib.remove(); sib = next; }
    // Render form
    const form = document.createElement('div');
    form.id = 'data-edit-form';
    form.innerHTML = renderDataEditForm(d, u);
    panel.appendChild(form);
    // Wire save button
    document.getElementById('data-edit-save-btn').onclick = () => saveDataEdit(uniId);
  } else {
    if (btn) btn.textContent = '✏️ Edit Data Manual';
    // Reload tab dengan data fresh
    const u = state.currentUni;
    let d = {};
    try { d = JSON.parse(u.data_json||'{}'); } catch(e) {}
    const panel = document.getElementById('tab-panel-uni-data');
    const editbar = document.getElementById('data-tab-editbar');
    let sib = editbar?.nextSibling;
    while (sib) { const next = sib.nextSibling; sib.remove(); sib = next; }
    const view = document.createElement('div');
    view.innerHTML = renderUniDataTab(d, u);
    panel.appendChild(view);
  }
}

function renderDataEditForm(d, u) {
  const programs = d.programs||d.programs_mentioned||[];
  const tuition  = d.tuition||d.tuition_updates||[];
  const req      = d.entry_requirements||{};
  const reqUG    = req.undergraduate||req.ug||{};
  const reqPG    = req.postgraduate||req.pg||{};
  const intake   = d.intake||d.intake_dates||[];
  const scholar  = d.scholarships||d.scholarship_updates||[];
  const ranking  = d.ranking||d.ranking_updates||[];
  const campus   = d.campus||{};
  const stats    = d.student_stats||{};
  const contact  = d.contact||{};

  // Helper: render row
  const progRows = programs.map((p,i) => {
    const name  = typeof p==='object'?(p.name||p.title||''):String(p);
    const level = typeof p==='object'?(p.level||''):'' ;
    return `<div class="batch-row" data-idx="${i}">
      <input class="prog-name" placeholder="Nama program" value="${esc(name)}" style="flex:2">
      <select class="prog-level" style="width:140px;flex:0">
        ${['undergraduate','postgraduate','diploma','certificate','doctoral','short course'].map(v=>
          `<option value="${v}" ${(level.toLowerCase()===v||(!level&&v==='undergraduate'))?'selected':''}>${v}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.batch-row').remove()" style="flex-shrink:0">✕</button>
    </div>`;
  }).join('');

  const tuitionRows = tuition.map((t,i) => `
    <div class="batch-row" style="flex-wrap:wrap;gap:6px;align-items:flex-start">
      <input class="t-program" placeholder="Program/Jenjang" value="${esc(String(t.program||t.name||t.level||''))}" style="flex:2;min-width:150px">
      <input class="t-fee" placeholder="Biaya" value="${esc(String(t.fee_amount||t.fee||t.amount||''))}" style="width:100px;flex:0">
      <input class="t-currency" placeholder="USD/AUD/..." value="${esc(String(t.fee_currency||t.currency||''))}" style="width:70px;flex:0">
      <input class="t-period" placeholder="per year..." value="${esc(String(t.fee_period||t.period||t.per||'per year'))}" style="width:90px;flex:0">
      <input class="t-note" placeholder="Catatan" value="${esc(String(t.note||t.notes||''))}" style="flex:1;min-width:100px">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.batch-row').remove()" style="flex-shrink:0">✕</button>
    </div>`).join('');

  const rankRows = ranking.map((r,i) => `
    <div class="batch-row">
      <input class="r-source" placeholder="Sumber (QS, THE...)" value="${esc(String(r.source||r.type||''))}" style="flex:1">
      <input class="r-rank" placeholder="Posisi (#50)" value="${esc(String(r.rank||r.position||''))}" style="width:80px;flex:0">
      <input class="r-year" placeholder="Tahun" value="${esc(String(r.year||''))}" style="width:70px;flex:0">
      <input class="r-subject" placeholder="Bidang (opsional)" value="${esc(String(r.subject||''))}" style="flex:1">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.batch-row').remove()" style="flex-shrink:0">✕</button>
    </div>`).join('');

  const scholarRows = scholar.map((s,i) => `
    <div class="batch-row" style="flex-wrap:wrap;gap:6px;align-items:flex-start">
      <input class="s-name" placeholder="Nama beasiswa" value="${esc(String(s.name||''))}" style="flex:2;min-width:160px">
      <input class="s-amount" placeholder="Nominal" value="${esc(String(s.amount||s.nominal||''))}" style="width:100px;flex:0">
      <input class="s-currency" placeholder="Mata uang" value="${esc(String(s.currency||''))}" style="width:60px;flex:0">
      <input class="s-deadline" placeholder="Deadline" value="${esc(String(s.deadline||''))}" style="width:110px;flex:0">
      <input class="s-level" placeholder="Jenjang" value="${esc(String(s.level||s.jenjang||''))}" style="width:100px;flex:0">
      <input class="s-req" placeholder="Syarat/Eligibilitas" value="${esc(String(s.requirements||s.eligibility||s.syarat||''))}" style="flex:2;min-width:140px">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.batch-row').remove()" style="flex-shrink:0">✕</button>
    </div>`).join('');

  const intakeRows = intake.map((i,idx) => `
    <div class="batch-row">
      <input class="i-intake" placeholder="Intake (Feb, Jul...)" value="${esc(String(i.intake||i.semester||i.period||''))}" style="flex:1">
      <input class="i-year" placeholder="Tahun" value="${esc(String(i.year||''))}" style="width:70px;flex:0">
      <input class="i-deadline" placeholder="Application deadline" value="${esc(String(i.deadline||''))}" style="flex:1">
      <input class="i-open" placeholder="Open date" value="${esc(String(i.open||''))}" style="flex:1">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.batch-row').remove()" style="flex-shrink:0">✕</button>
    </div>`).join('');

  const fieldGroup = (title, id, rows, addFn, addLabel='＋ Tambah Baris') => `
    <div class="data-section" style="margin-bottom:12px">
      <div class="data-section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${title}</span>
        <button class="btn btn-ghost btn-sm" onclick="${addFn}()">＋ ${addLabel}</button>
      </div>
      <div id="${id}">${rows||`<div style="color:var(--text3);font-size:12px;padding:6px 0">Belum ada data — klik tombol untuk tambah</div>`}</div>
    </div>`;

  return `
    <div style="background:var(--yellow-dim);border:1px solid var(--yellow);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--yellow);margin-bottom:14px">
      ✏️ Mode Edit Manual — perubahan akan meng-override data hasil sync. Klik Simpan ketika selesai.
    </div>

    ${fieldGroup('🎓 Program / Jurusan', 'edit-programs', progRows, 'addProgRow', 'Tambah Program')}
    ${fieldGroup('💰 Biaya Kuliah', 'edit-tuition', tuitionRows, 'addTuitionRow', 'Tambah Biaya')}

    <div class="data-section" style="margin-bottom:12px">
      <div class="data-section-title">📝 Syarat Masuk</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px">UNDERGRADUATE (S1)</div>
          <div class="form-group"><label>IELTS Min</label><input id="req-ug-ielts" value="${esc(String(reqUG.ielts_min||''))}" placeholder="6.0"></div>
          <div class="form-group"><label>TOEFL Min</label><input id="req-ug-toefl" value="${esc(String(reqUG.toefl_min||''))}" placeholder="80"></div>
          <div class="form-group"><label>GPA Min</label><input id="req-ug-gpa" value="${esc(String(reqUG.gpa_min||''))}" placeholder="3.0"></div>
          <div class="form-group"><label>SAT Min</label><input id="req-ug-sat" value="${esc(String(reqUG.sat_min||''))}" placeholder="opsional"></div>
          <div class="form-group"><label>Catatan</label><textarea id="req-ug-notes" style="min-height:60px">${esc(String(reqUG.notes||''))}</textarea></div>
        </div>
