async function saveDataEdit(uniId) {
  const btn = document.getElementById('data-edit-save-btn');
  if (btn) { btn.disabled=true; btn.textContent='💾 Menyimpan...'; }
  try {
    const u = state.currentUni;
    let existing = {};
    try { existing = JSON.parse(u.data_json||'{}'); } catch(e) {}

    // ── Collect programs ──
    const programs = [...document.querySelectorAll('#edit-programs .batch-row')].map(row => ({
      name:  row.querySelector('.prog-name')?.value?.trim()||'',
      level: row.querySelector('.prog-level')?.value||'undergraduate',
    })).filter(p=>p.name);

    // ── Collect tuition ──
    const tuition = [...document.querySelectorAll('#edit-tuition .batch-row')].map(row => ({
      program:  row.querySelector('.t-program')?.value?.trim()||'',
      fee:      row.querySelector('.t-fee')?.value?.trim()||'',
      currency: row.querySelector('.t-currency')?.value?.trim()||'',
      period:   row.querySelector('.t-period')?.value?.trim()||'per year',
      note:     row.querySelector('.t-note')?.value?.trim()||'',
    })).filter(t=>t.program||t.fee);

    // ── Collect ranking ──
    const ranking = [...document.querySelectorAll('#edit-ranking .batch-row')].map(row => ({
      source:  row.querySelector('.r-source')?.value?.trim()||'',
      rank:    row.querySelector('.r-rank')?.value?.trim()||'',
      year:    row.querySelector('.r-year')?.value?.trim()||'',
      subject: row.querySelector('.r-subject')?.value?.trim()||'',
    })).filter(r=>r.source||r.rank);

    // ── Collect scholarships ──
    const scholarships = [...document.querySelectorAll('#edit-scholarships .batch-row')].map(row => ({
      name:         row.querySelector('.s-name')?.value?.trim()||'',
      amount:       row.querySelector('.s-amount')?.value?.trim()||'',
      currency:     row.querySelector('.s-currency')?.value?.trim()||'',
      deadline:     row.querySelector('.s-deadline')?.value?.trim()||'',
      level:        row.querySelector('.s-level')?.value?.trim()||'',
      requirements: row.querySelector('.s-req')?.value?.trim()||'',
    })).filter(s=>s.name);

    // ── Collect intake ──
    const intake = [...document.querySelectorAll('#edit-intake .batch-row')].map(row => ({
      intake:   row.querySelector('.i-intake')?.value?.trim()||'',
      year:     row.querySelector('.i-year')?.value?.trim()||'',
      deadline: row.querySelector('.i-deadline')?.value?.trim()||'',
      open:     row.querySelector('.i-open')?.value?.trim()||'',
    })).filter(i=>i.intake);

    // ── Collect campus / stats ──
    const campusCity     = document.getElementById('campus-city')?.value?.trim()||'';
    const campusType     = document.getElementById('campus-type')?.value?.trim()||'';
    const campusAddress  = document.getElementById('campus-address')?.value?.trim()||'';
    const facilitiesRaw  = document.getElementById('campus-facilities')?.value||'';
    const facilities     = facilitiesRaw.split(',').map(s=>s.trim()).filter(Boolean);
    const contactEmail   = document.getElementById('contact-email')?.value?.trim()||'';
    const contactPhone   = document.getElementById('contact-phone')?.value?.trim()||'';
    const foundedYear    = document.getElementById('stats-founded')?.value?.trim()||'';
    const totalStudents  = document.getElementById('stats-students')?.value?.trim()||'';
    const intlStudents   = document.getElementById('stats-intl')?.value?.trim()||'';
    const staffRatio     = document.getElementById('stats-ratio')?.value?.trim()||'';
    const rawNotes       = document.getElementById('edit-raw-notes')?.value?.trim()||'';

    // ── Build entry_requirements ──
    const buildReq = (prefix) => {
      const r = {};
      const v = (id) => document.getElementById(`${prefix}-${id}`)?.value?.trim()||'';
      if (v('ielts')) r.ielts_min = v('ielts');
      if (v('toefl')) r.toefl_min = v('toefl');
      if (v('gpa'))   r.gpa_min   = v('gpa');
      if (v('sat'))   r.sat_min   = v('sat');
      if (v('gmat'))  r.gmat_min  = v('gmat');
      if (v('notes')) r.notes     = v('notes');
      return Object.keys(r).length ? r : null;
    };

    const entry_requirements = {};
    const ugReq = buildReq('req-ug');
    const pgReq = buildReq('req-pg');
    if (ugReq) entry_requirements.undergraduate = ugReq;
    if (pgReq) entry_requirements.postgraduate  = pgReq;

    // ── Merge all into data_json ──
    const newData = {
      ...existing,
      ...(programs.length   ? { programs }    : {}),
      ...(tuition.length    ? { tuition }     : {}),
      ...(Object.keys(entry_requirements).length ? { entry_requirements } : {}),
      ...(ranking.length    ? { ranking }     : {}),
      ...(scholarships.length?{ scholarships }: {}),
      ...(intake.length     ? { intake }      : {}),
      campus: {
        ...(existing.campus||{}),
        ...(campusCity    ? { city: campusCity }         : {}),
        ...(campusType    ? { type: campusType }         : {}),
        ...(campusAddress ? { address: campusAddress }   : {}),
        ...(facilities.length ? { facilities }           : {}),
      },
      student_stats: {
        ...(existing.student_stats||{}),
        ...(foundedYear   ? { founded_year: foundedYear }              : {}),
        ...(totalStudents ? { total_students: totalStudents }          : {}),
        ...(intlStudents  ? { international_students: intlStudents }   : {}),
        ...(staffRatio    ? { student_staff_ratio: staffRatio }        : {}),
      },
      contact: {
        ...(existing.contact||{}),
        ...(contactEmail ? { email: contactEmail } : {}),
        ...(contactPhone ? { phone: contactPhone } : {}),
      },
      ...(rawNotes ? { raw_notes: rawNotes } : {}),
      manually_edited: true,
      manual_edit_date: new Date().toISOString(),
    };

    // Hitung freshness score sederhana
    let score = 0;
    if (newData.programs?.length)                                     score += 15;
    if (newData.tuition?.length)                                      score += 20;
    if (newData.entry_requirements?.undergraduate?.ielts_min)        score += 15;
    if (newData.intake?.length)                                       score += 15;
    if (newData.scholarships?.length)                                 score += 10;
    if (newData.campus?.city)                                         score += 10;
    if (newData.ranking?.length)                                      score += 10;
    if (newData.student_stats?.total_students||newData.student_stats?.founded_year) score += 5;
    score = Math.min(score, 100);

    await API.patch(`/api/universities/${uniId}`, {
      data_json:             JSON.stringify(newData),
      data_freshness_score:  score,
      data_last_synced:      new Date().toISOString(),
    });

    toast(`Data disimpan ✓ (Freshness: ${score}/100)`);
    _dataEditMode = false;

    // Reload state + panel
    const uFresh = await API.get(`/api/universities/${uniId}`);
    state.currentUni = uFresh;
    let dFresh = {};
    try { dFresh = JSON.parse(uFresh.data_json||'{}'); } catch(e) {}
    const panel = document.getElementById('tab-panel-uni-data');
    const editbar = document.getElementById('data-tab-editbar');
    if (editbar) {
      let sib = editbar.nextSibling;
      while (sib) { const next=sib.nextSibling; sib.remove(); sib=next; }
      const editBtn = editbar.querySelector('button');
      if (editBtn) editBtn.textContent = '✏️ Edit Data Manual';
    }
    const view = document.createElement('div');
    view.innerHTML = renderUniDataTab(dFresh, uFresh);
    panel?.appendChild(view);
  } catch(e) {
    toast('Gagal simpan: '+e.message, 'err');
    if (btn) { btn.disabled=false; btn.textContent='💾 Simpan Data'; }
  }
}

async function syncUniFromModal(id) {
  const btn = document.getElementById('modal-sync-btn');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Starting...'; }
  try {
    await API.post(`/api/universities/${id}/sync`);
    toast('Sync dimulai di background...');
    if (btn) btn.textContent='⏳ Syncing...';
    // Poll dan update modal
    const poller = setInterval(async () => {
      const s = await API.get(`/api/universities/${id}/sync/status`);
      if (s.sync_status !== 'running') {
        clearInterval(poller);
        if (btn) { btn.disabled=false; btn.textContent='↻ Sync Data Sekarang'; }
        if (s.sync_status==='done') {
          toast(`✓ Sync selesai! Freshness: ${s.data_freshness_score}%`);
          openUni(id); // reload modal
        } else {
          toast('Sync error: '+(s.sync_error||'unknown'),'err');
        }
      }
    }, 4000);
  } catch(e) {
    toast('Error: '+e.message,'err');
    if (btn) { btn.disabled=false; btn.textContent='↻ Sync Data Sekarang'; }
  }
}

async function renderGsc() {

      { label:'Total Clicks',       val: overview.total_clicks||0       },
      { label:'Total Impressions',   val: overview.total_impressions||0  },
      { label:'Avg CTR',             val: overview.avg_ctr ? (overview.avg_ctr*100).toFixed(2)+'%' : '—' },
      { label:'Avg Position',        val: overview.avg_position ? overview.avg_position.toFixed(1) : '—' },
    ] : [];

      { label:'Top 3',    val: summary.top3||0,    color:'var(--green)'  },

      <div class="section-header">
        <h2>GSC Performance</h2>
        <div class="flex-gap">
          <span class="badge ${status.connected?'badge-published':'badge-error'}">${status.connected?'✓ Connected':'✗ Disconnected'}</span>
          <button class="btn btn-ghost btn-sm" onclick="syncGsc()">↻ Sync GSC</button>
        </div>
      </div>
      ${status.last_sync?`<p style="font-size:11px;color:var(--text3);margin-bottom:14px">Last sync: ${fmtDt(status.last_sync)} · ${status.urls_tracked} URLs tracked</p>`:''}

      ${overviewStats.length ? `<div class="stats-grid" style="margin-bottom:16px">
        ${overviewStats.map(s=>`<div class="stat-card"><div class="stat-value">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('')}

      ${posStats.length ? `<div class="card" style="margin-bottom:16px">

        <div style="display:flex;gap:24px;flex-wrap:wrap">

async function loadGscPerf(filter) {
  try {
    const params = filter ? `?filter=${filter}` : '';

      <div class="table-wrap" style="margin-top:8px">
        <table>
          <thead><tr><th>Artikel</th><th>Clicks</th><th>Impr.</th><th>CTR</th><th>Pos.</th><th>QC</th></tr></thead>

            <td class="td-title">
              <span class="td-title-text">${esc(r.title)}</span>
              ${r.wp_url?`<a href="${esc(r.wp_url)}" target="_blank" class="td-sub">↗ ${esc(r.wp_url.replace(/https?:\/\//,'').substring(0,40))}</a>`:''}
            </td>
            <td style="font-weight:600;color:var(--accent)">${r.clicks??'—'}</td>
            <td>${r.impressions??'—'}</td>

            <td>${r.position!=null?r.position.toFixed(1):'—'}</td>
            <td>${qcBadge(r.qc_score)}</td>
          </tr>`).join('')}</tbody>
        </table>

  } catch(e) { setHtml('gsc-perf-table', emptyState('⚠️','Error',e.message)); }
}

async function doKeywordResearch() {

  try {
    const r = await API.post('/api/seo/keyword-research', { keyword });

    setHtml('kw-result', `
      <div class="card" style="margin-bottom:12px">
        <div class="section-header"><h2>People Also Ask</h2></div>
        ${(d.paa||[]).length===0?emptyState('❓','Tidak ada PAA'):
          (d.paa||[]).map(q=>`<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">❓ ${esc(q.question)}</div>`).join('')}

        </div>
      </div>
      <div class="card">
        <div class="section-header"><h2>Top 5 Competitors di SERP</h2></div>
        <div class="table-wrap"><table><thead><tr><th>#</th><th>Title</th><th>Domain</th></tr></thead>
          <tbody>${(d.topDomains||[]).map((t,i)=>`<tr>
            <td style="color:var(--text3)">${i+1}</td>
            <td style="font-size:12px">${esc(t.title)}</td>
            <td><a href="${esc(t.link)}" target="_blank" style="font-size:11px">${esc(t.domain)}</a></td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`);
  } catch(e) { setHtml('kw-result', emptyState('⚠️','Error',e.message)); }
  finally { btn.disabled=false; btn.textContent='🔍 Research'; }
}

    const r = await API.get('/api/trending?days=90');
    archive = r.archive || [];
    trendingState.archive = archive;
  } catch(e) {}
  trendingState.selected = archive.length ? archive[0].scan_date : null;
  _renderTrendingLayout();
  if (trendingState.selected) _loadSelectedTopics(trendingState.selected);
}

function _renderTrendingLayout() {
  const container = document.getElementById('content');
  if (!container) return;
  const archive = trendingState.archive;
  const m = trendingState.month;
  const y = m.getFullYear(), mo = m.getMonth();
  const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const dayLabels = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const firstDay = new Date(y, mo, 1).getDay();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const scanDates = {};
  archive.forEach(function(a) { scanDates[a.scan_date] = a; });

  // Build calendar cells — NO single quotes in onclick, use data attributes
  let calCells = dayLabels.map(function(d) {
    return '<div style="text-align:center;font-size:10px;color:var(--text3);padding:2px">' + d + '</div>';
  }).join('');

  for (let i = 0; i < firstDay; i++) calCells += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = y + '-' + String(mo+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const hasScan = !!scanDates[ds];
    const isToday = ds === today;
    const isSel = ds === trendingState.selected;
    const bg = isSel ? 'var(--accent)' : hasScan ? 'var(--accent-dim)' : 'transparent';
    const col = isSel ? '#fff' : hasScan ? 'var(--accent)' : isToday ? 'var(--accent)' : 'var(--text3)';
    const fw = (hasScan || isToday) ? '700' : '400';
    const border = (isToday && !isSel) ? '1px solid var(--accent)' : '1px solid transparent';
    const dot = hasScan ? '<div style="width:5px;height:5px;background:' + (isSel ? '#fff' : 'var(--accent)') + ';border-radius:50%;margin:1px auto 0"></div>' : '';
    const cursor = hasScan ? 'pointer' : 'default';
    calCells += '<div data-tdate="' + ds + '" data-hasscan="' + hasScan + '" style="cursor:' + cursor + ';text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;background:' + bg + ';color:' + col + ';font-weight:' + fw + ';border:' + border + '">' + d + dot + '</div>';
  }

  // Sidebar list
  let recentHtml = '';
  if (archive.length === 0) {
    recentHtml = '<div style="color:var(--text3);font-size:12px;padding:12px">Belum ada scan</div>';
  } else {
    archive.slice(0, 30).forEach(function(a, i) {
      const isSel = a.scan_date === trendingState.selected;
      const summary = (a.summary || '').slice(0, 60);
      recentHtml += '<div data-tdate="' + a.scan_date + '" data-hasscan="true" style="padding:8px 12px;cursor:pointer;border-radius:var(--rs);margin-bottom:2px;background:' + (isSel ? 'var(--accent-dim)' : 'transparent') + ';border-left:3px solid ' + (isSel ? 'var(--accent)' : 'transparent') + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-size:12px;font-weight:' + (isSel ? 700 : 500) + ';color:' + (isSel ? 'var(--accent)' : 'var(--text)') + '">' + (i === 0 ? '🟢 ' : '📅 ') + a.scan_date + '</span>' +
          '<span class="badge badge-queued" style="font-size:10px">' + a.total_topics + ' topic</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">' + summary + '</div>' +
      '</div>';
    });
  }

  container.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">' +
      '<div><h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🔥 Trending Topics Archive</h2>' +
      '<p style="font-size:12px;color:var(--text3)">' + archive.length + ' hari terscan · Klik tanggal untuk lihat detail</p></div>' +
      '<button onclick="triggerTrendingScan()" class="btn btn-primary btn-sm" id="btn-scan-now">⟳ Scan Now</button>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start">' +
      '<div>' +
        '<div class="card" style="margin-bottom:12px;padding:14px">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
            '<button onclick="_trendingCalNav(-1)" class="btn btn-ghost btn-sm" style="padding:3px 8px">‹</button>' +
            '<span style="font-size:12px;font-weight:600">' + monthNames[mo] + ' ' + y + '</span>' +
            '<button onclick="_trendingCalNav(1)" class="btn btn-ghost btn-sm" style="padding:3px 8px">›</button>' +
          '</div>' +
          '<div id="trending-cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">' + calCells + '</div>' +
        '</div>' +
        '<div class="card" style="padding:8px;max-height:420px;overflow-y:auto" id="trending-list-panel">' +
          '<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:4px 12px;margin-bottom:4px">Riwayat Scan</div>' +
          recentHtml +
        '</div>' +
      '</div>' +
      '<div id="trending-detail-panel">' +
        (trendingState.selected
          ? '<div class="card"><div style="text-align:center;padding:24px;color:var(--text3)"><span class="spin" style="display:inline-block;font-size:24px">⏳</span><div style="margin-top:8px;font-size:13px">Memuat topics...</div></div></div>'
          : '<div class="card">' + emptyState('🔥','Pilih tanggal untuk lihat trending topics','Klik titik biru di kalender atau baris di riwayat scan') + '</div>') +
      '</div>' +
    '</div>';

  // Wire click events via delegation (no inline quotes issue)
  document.querySelectorAll('[data-tdate][data-hasscan="true"]').forEach(function(el) {
    el.addEventListener('click', function() { _selectTrendingDate(el.dataset.tdate); });
  });
}

function _trendingCalNav(dir) {
  const m = trendingState.month;
  trendingState.month = new Date(m.getFullYear(), m.getMonth() + dir, 1);
  _renderTrendingLayout();
  if (trendingState.selected) _loadSelectedTopics(trendingState.selected);
}

function _selectTrendingDate(date) {
  const scan = trendingState.archive.find(function(a) { return a.scan_date === date; });
  if (!scan) return;
  trendingState.selected = date;
  const d = new Date(date + 'T00:00:00');
  trendingState.month = new Date(d.getFullYear(), d.getMonth(), 1);
  _renderTrendingLayout();
  _loadSelectedTopics(date);
}

async function _loadSelectedTopics(date) {
  const panel = document.getElementById('trending-detail-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="card"><div style="text-align:center;padding:24px;color:var(--text3)"><span class="spin" style="display:inline-block;font-size:24px">⏳</span></div></div>';
  try {
    const r = await API.get('/api/trending/' + date);
    const topics = r.topics || [];
    const scan = r.scan || {};
    const catColor = function(c) {
      if (c === 'scholarship') return 'var(--green)';
      if (c === 'university') return 'var(--blue)';
      if (c === 'visa') return 'var(--purple)';
      if (c === 'country') return 'var(--accent)';
      return 'var(--orange)';
    };
    const isToday = date === new Date().toISOString().split('T')[0];
    let html = '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
        '<div>' +
          '<div style="font-size:14px;font-weight:700">🔥 Trending Topics</div>' +
          '<div style="font-size:11px;color:var(--text3);margin-top:2px">' + (isToday ? 'Hari ini · ' : '') + date + ' · ' + topics.length + ' topics</div>' +
        '</div>' +
      '</div>';
    if (scan.summary) {
      html += '<div style="font-size:12px;color:var(--text2);padding:10px 12px;background:var(--surface2);border-radius:var(--rs);margin-bottom:14px;line-height:1.6">' + esc(scan.summary) + '</div>';
    }
    if (topics.length === 0) {
      html += emptyState('📭', 'Tidak ada topics untuk tanggal ini');
    } else {
      topics.forEach(function(t) {
        html += '<div style="border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">' +
            '<div style="font-size:13px;font-weight:600;line-height:1.4">' + esc(t.title) + '</div>' +
            '<span style="flex-shrink:0;display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:' + catColor(t.category) + ';color:#fff">' + esc(t.category || 'general') + '</span>' +
          '</div>' +
          '<p style="font-size:12px;color:var(--text2);margin:0 0 8px;line-height:1.5">' + esc(t.description || '') + '</p>' +
          '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">' +
            '<span style="font-size:11px;color:var(--text3)">🌏 ' + esc(t.country || 'global') + '</span>' +
            '<span style="font-size:11px;color:var(--text3)">⭐ ' + t.relevance + '/10</span>' +
            (t.keyword ? '<span style="font-size:11px;color:var(--accent);font-weight:500">🔑 ' + esc(t.keyword) + '</span>' : '') +
            (t.article_created
              ? '<span class="badge badge-published" style="font-size:10px">✓ Artikel dibuat</span>'
              : '<button class="btn btn-ghost btn-sm create-topic-btn" style="font-size:11px;margin-left:auto" data-topicid="' + t.id + '" data-keyword="' + esc(t.keyword || t.title) + '">+ Buat Artikel</button>') +
          '</div>' +
        '</div>';
      });
    }
    html += '</div>';
    panel.innerHTML = html;
    // Wire create article buttons
    panel.querySelectorAll('.create-topic-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        createArticleFromTopic(btn.dataset.topicid, btn.dataset.keyword);
      });
    });
  } catch(e) {
    panel.innerHTML = '<div class="card">' + emptyState('⚠️', 'Error load topics', e.message) + '</div>';
  }
}

async function triggerTrendingScan() {
  const btn = document.getElementById('btn-scan-now');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Scanning...'; }
  try {
    const r = await API.post('/api/trending/scan');
    if (r.skipped) { toast('Sudah scan hari ini: ' + r.date); }
    else { toast('Scan selesai! ' + (r.topics_count || 0) + ' topics ditemukan'); renderTrending(); }
  } catch(e) { toast('Scan error: ' + e.message, 'err'); }
  if (btn) { btn.disabled = false; btn.textContent = '⟳ Scan Now'; }
}

async function createArticleFromTopic(topicId, keyword) {
  try {
    const r = await API.post('/api/trending/' + topicId + '/create-article');
    toast('Artikel ditambahkan ke queue ✓ (ID: ' + (r.articleId || '-') + ')');
    // Navigate ke Articles page supaya user bisa lihat progress
    navigate('articles');
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

async function renderSchedule() {
  const container = document.getElementById('content');
  if (!container) return;
  container.innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div><h1>📅 Article Schedule</h1><p style="color:var(--muted)">Jadwalkan generate & publish artikel otomatis</p></div>
      <button onclick="showScheduleForm()" class="btn btn-primary">+ Tambah Jadwal</button>
    </div>
    <div id="schedule-form" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
      <h3 style="margin:0 0 16px">📝 Jadwalkan Artikel Baru</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Judul Artikel</label><input id="sch-title" class="input" placeholder="Judul artikel..." style="width:100%"></div>
        <div><label>Focus Keyword</label><input id="sch-kw" class="input" placeholder="keyword utama..." style="width:100%"></div>
        <div><label>📅 Generate Pada</label><input id="sch-gen" type="datetime-local" class="input" style="width:100%"></div>
        <div><label>🚀 Publish Pada</label><input id="sch-pub" type="datetime-local" class="input" style="width:100%"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="saveSchedule()" class="btn btn-primary">💾 Simpan Jadwal</button>
        <button onclick="document.getElementById('schedule-form').style.display='none'" class="btn">Batal</button>
      </div>
    </div>
    <div id="schedule-list"><div class="loading">Loading jadwal...</div></div>

}

function showScheduleForm() {
  const f = document.getElementById('schedule-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  // Set default generate time to tomorrow 07:00
  const tmr = new Date(); tmr.setDate(tmr.getDate()+1); tmr.setHours(7,0,0);
  document.getElementById('sch-gen').value = tmr.toISOString().slice(0,16);
  const pub = new Date(tmr); pub.setHours(pub.getHours()+6);
  document.getElementById('sch-pub').value = pub.toISOString().slice(0,16);
}

async function saveSchedule() {
  const title = document.getElementById('sch-title').value.trim();
  const kw    = document.getElementById('sch-kw').value.trim();
  const gen   = document.getElementById('sch-gen').value;
  const pub   = document.getElementById('sch-pub').value;
  if (!title || !kw) { toast('Judul dan keyword wajib diisi','err'); return; }
  try {
    const r = await API.post('/api/schedule', {
      title, keyword: kw,
      scheduled_generate_at: gen ? new Date(gen).toISOString() : null,
      scheduled_publish_at:  pub ? new Date(pub).toISOString() : null,
    });
    toast('Jadwal berhasil disimpan! ✓');
    document.getElementById('schedule-form').style.display = 'none';
    await loadScheduleList();
  } catch(e) { toast(e.message,'err'); }
}

async function loadScheduleList() {
  const el = document.getElementById('schedule-list');
  try {
    const r = await API.get('/api/schedule');
    if (!r.items || r.items.length === 0) {
      el.innerHTML = `<div class="empty-state" style="text-align:center;padding:40px;color:var(--muted)">Belum ada jadwal. Klik "+ Tambah Jadwal" untuk mulai.</div>`;
      return;
    }
    const statusColors = { pending:'var(--yellow)', generating:'var(--blue)', draft:'var(--orange)', published:'var(--green)', failed:'var(--red)' };
    el.innerHTML = `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:10px">Artikel</th>
          <th style="text-align:left;padding:10px">Generate At</th>
          <th style="text-align:left;padding:10px">Publish At</th>
          <th style="text-align:left;padding:10px">Status</th>
          <th style="text-align:left;padding:10px">QC</th>
          <th style="padding:10px">Aksi</th>
        </tr></thead>
        <tbody>${r.items.map(i => `
          <tr style="border-bottom:1px solid var(--border);hover:background:var(--bg)">
            <td style="padding:10px">
              <div><strong>${i.title}</strong></div>
              <div style="font-size:12px;color:var(--muted)">${i.keyword}</div>
            </td>
            <td style="padding:10px;font-size:13px">${i.scheduled_generate_at ? new Date(i.scheduled_generate_at).toLocaleString('id-ID') : '-'}</td>
            <td style="padding:10px;font-size:13px">${i.scheduled_publish_at ? new Date(i.scheduled_publish_at).toLocaleString('id-ID') : '-'}</td>
            <td style="padding:10px">
              <span class="badge" style="background:${statusColors[i.status]||'var(--muted)'};color:#fff;padding:3px 10px;border-radius:10px">${i.status}</span>
            </td>
            <td style="padding:10px">${i.qc_score || '-'}</td>
            <td style="padding:10px;text-align:center">
              <button onclick="deleteSchedule(${i.id})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px" title="Hapus">🗑</button>
            </td>
          </tr>
        `).join('')}</tbody>
      </table>
    `;
  } catch(e) { el.innerHTML = `<div class="error">${e.message}</div>`; }
}

async function deleteSchedule(id) {
  if (!window.confirm('Hapus jadwal ini?')) return;
  try {
    await API.del('/api/schedule/'+id);
    toast('Jadwal dihapus ✓');
    await loadScheduleList();
  } catch(e) { toast(e.message, 'err'); }
}


// --- Article Edit Mode ---
let _editOriginalHtml = null;
let _editTargetImg = null;

function toggleArticleEdit(id) {
  const el = document.getElementById('article-preview-content');
  if (!el) return;
  _editOriginalHtml = el.innerHTML;
  el.contentEditable = 'true';
  el.focus();
  el.querySelectorAll('img').forEach(img => {
    img.onclick = (e) => { e.preventDefault(); _editMode='replace'; _editTargetImg=img; openImgPicker(img); };
  });
  const _tb = document.getElementById('editor-toolbar');
  if (_tb) _tb.style.display = 'flex';
  document.getElementById('btn-preview-edit').style.display = 'none';
  document.getElementById('btn-preview-save').style.display = '';
  document.getElementById('btn-preview-cancel').style.display = '';
}

function cancelArticleEdit() {
  const el = document.getElementById('article-preview-content');
  if (!el) return;
  if (_editOriginalHtml !== null) el.innerHTML = _editOriginalHtml;
  el.contentEditable = 'false';
  _editOriginalHtml = null;
  document.getElementById('btn-preview-edit').style.display = '';
  document.getElementById('btn-previey-save').style.display = 'none';
  document.getElementById('btn-preview-cancel').style.display = 'none';
  const _ctb = document.getElementById('editor-toolbar');
  if (_ctb) _ctb.style.display = 'none';
}

async function saveArticleContent(id) {
  const el = document.getElementById('article-preview-content');
  if (!el) return;
  const html = el.innerHTML;
  el.contentEditable = 'false';
  const saveBtn = document.getElementById('btn-preview-save');
  saveBtn.textContent = 'Menyimpan...';
  try {
    await API.patch('/api/articles/' + id, { content_html: html });
    _editOriginalHtml = null;
    document.getElementById('btn-preview-edit').style.display = '';
    saveBtn.style.display = 'none';
    document.getElementById('btn-preview-cancel').style.display = 'none';
    saveBtn.textContent = 'Simpan';
    const _stb = document.getElementById('editor-toolbar');
    if (_stb) _stb.style.display = 'none';
    toast('Artikel berhasil disimpan', 'success');
    if (state.currentArticle) state.currentArticle.content_html = html;
  } catch(e) {
    el.contentEditable = 'true';
    saveBtn.textContent = 'Simpan';
    toast('Gagal menyimpan: ' + e.message, 'error');
  }
}

function openImgPicker(imgEl) {
  _editTargetImg = imgEl;
  document.getElementById('img-picker-panel').classList.add('open');
  document.getElementById('img-picker-overlay').classList.add('open');
  const q = ((state.currentArticle && (state.currentArticle.keyword || state.currentArticle.title)) || '').split(' ').slice(0,3).join(' ');
  document.getElementById('img-picker-query').value = q;
  searchImgPicker();
}

function closeImgPicker() {
  document.getElementById('img-picker-panel').classList.remove('open');
  document.getElementById('img-picker-overlay').classList.remove('open');
  _editTargetImg = null;
}

async function searchImgPicker() {
  const q = document.getElementById('img-picker-query').value.trim();
  if (!q) return;
  const grid = document.getElementById('img-picker-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;opacity:.6">Mencari...</div>';
  try {
    const data = await API.get('/api/articles/image-search?q=' + encodeURIComponent(q));
    if (!data.photos || data.photos.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;opacity:.6">Tidak ada hasil</div>';
      return;
    }
    grid.innerHTML = data.photos.map(p =>
      '<img src="' + esc(p.thumb) + '" title="' + esc(p.alt) + '" onclick="pickImg(' + "'"+encodeURIComponent(p.url)+"','"+encodeURIComponent(p.photographer)+"','"+encodeURIComponent(p.alt)+"')" + '" loading="lazy">'
    ).join('');
  } catch(e) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;opacity:.6">Error: ' + esc(e.message) + '</div>';
  }
}

function pickImg(urlEnc, photographerEnc, altEnc) {
  const url = decodeURIComponent(urlEnc);
  const alt = decodeURIComponent(altEnc);
  if (_editMode === 'insert' && _insertRange) {
    const img = document.createElement('img');
    img.src = url; img.alt = alt;
    img.style.cssText = 'max-width:100%;height:auto;border-radius:6px;margin:8px 0;display:block;cursor:pointer';
    img.onclick = (e) => { e.preventDefault(); _editMode='replace'; _editTargetImg=img; openImgPicker(img); };
    _insertRange.deleteContents();
    _insertRange.insertNode(img);
    _insertRange = null; _editMode = 'replace';
    closeImgPicker();
    toast('Gambar disisipkan. Klik Simpan untuk menyimpan.', 'info');
  } else if (_editTargetImg) {
    _editTargetImg.src = url; _editTargetImg.alt = alt;
    closeImgPicker();
    toast('Gambar diganti. Klik Simpan untuk menyimpan.', 'info');
  } else {
    closeImgPicker();
  }
}


async function uploadImgFile(file) {
  if (!file) return;
  if (!_editTargetImg) { toast('Klik Edit dulu, lalu klik gambar yang ingin diganti', 'error'); return; }
  const status = document.getElementById('img-upload-status');
  const input = document.getElementById('img-upload-input');
  status.style.display = 'flex';
  status.innerHTML = '<div class="spinner"></div><span>Mengupload ke WordPress...</span>';
  try {
    const resp = await fetch('/api/articles/upload-image', {
      method: 'POST',
      headers: {
        'Content-Type': file.type || 'image/jpeg',
        'x-api-key': 'claude2026',
        'x-alt-text': encodeURIComponent(file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')),
      },
      body: file,
    });
    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Upload gagal');
    if (_editMode === 'insert' && _insertRange) {
      const img = document.createElement('img');
      img.src = data.url; img.alt = file.name.replace(/\.[^.]+$/, '');
      img.style.cssText = 'max-width:100%;height:auto;border-radius:6px;margin:8px 0;display:block;cursor:pointer';
      img.onclick = (e) => { e.preventDefault(); _editMode='replace'; _editTargetImg=img; openImgPicker(img); };
      _insertRange.deleteContents();
      _insertRange.insertNode(img);
      _insertRange = null; _editMode = 'replace';
    } else if (_editTargetImg) {
      _editTargetImg.src = data.url;
      _editTargetImg.alt = file.name.replace(/\.[^.]+$/, '');
    }
    status.style.display = 'none';
    if (input) input.value = '';
    closeImgPicker();
    toast('Upload sukses! Klik Simpan untuk menyimpan perubahan.', 'success');
  } catch(e) {
    status.innerHTML = '<span style="color:#ef4444">&#x26A0; Gagal: ' + esc(e.message) + '</span>';
    if (input) input.value = '';
    toast('Upload gagal: ' + e.message, 'error');
  }
}


// --- Rich Text Editor ---
let _editMode = 'replace';
let _insertRange = null;

function fmt(cmd, val) {
  const el = document.getElementById('article-preview-content');
  if (el) el.focus();
  document.execCommand('styleWithCSS', false, true);
  document.execCommand(cmd, false, val || null);
}

function changeFontSize(delta) {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) { toast('Pilih teks dulu untuk mengubah ukuran', 'info'); return; }
  const el = document.getElementById('article-preview-content');
  if (el) el.focus();
  const range = sel.getRangeAt(0);
  const anchor = sel.anchorNode && sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
  const cur = anchor ? parseFloat(window.getComputedStyle(anchor).fontSize) || 14 : 14;
  const next = Math.max(10, Math.min(40, cur + delta * 2));
  const span = document.createElement('span');
  span.style.fontSize = next + 'px';
  try { range.surroundContents(span); } catch(e) {
    document.execCommand('styleWithCSS', false, true);
    document.execCommand('fontSize', false, delta > 0 ? '5' : '3');
  }
}

function insertImgAtCursor() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) { toast('Letakkan kursor di posisi yang diinginkan dulu', 'info'); return; }
  _editMode = 'insert';
  _editTargetImg = null;
  _insertRange = sel.getRangeAt(0).cloneRange();
  document.getElementById('img-picker-panel').classList.add('open');
  document.getElementById('img-picker-overlay').classList.add('open');
  const q = ((state.currentArticle && (state.currentArticle.keyword || state.currentArticle.title)) || '').split(' ').slice(0,3).join(' ');
  document.getElementById('img-picker-query').value = q;
  searchImgPicker();
}

</script>

<div id="img-picker-overlay" onclick="closeImgPicker()"></div>
<div id="img-picker-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <strong>Ganti Gambar</strong>
    <button class="btn btn-ghost btn-sm" onclick="closeImgPicker()">&#x2715;</button>
  </div>
  <div style="display:flex;gap:8px">
    <input id="img-picker-query" class="input" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)" placeholder="Cari gambar..." onkeydown="if(event.key==='Enter')searchImgPicker()">
    <button onclick="searchImgPicker()" style="background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px">Cari</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin:10px 0 6px">
    <div style="flex:1;height:1px;background:var(--border)"></div>
    <span style="font-size:11px;opacity:.5;white-space:nowrap">atau upload manual</span>
    <div style="flex:1;height:1px;background:var(--border)"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <input type="file" id="img-upload-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" onchange="uploadImgFile(this.files[0])">
    <button onclick="document.getElementById('img-upload-input').click()" style="width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:13px;text-align:center">&#128442; Pilih Gambar dari Perangkat</button>
  </div>
  <div id="img-upload-status" style="display:none;margin-top:6px"></div>
  <div id="img-picker-grid" class="img-picker-grid"></div>
  <p style="font-size:11px;opacity:.5;margin-top:8px;text-align:right">Foto dari Pexels</p>
</div>
</body>
</html>
